[package]
name = "devbase"
version = "0.1.0"
edition = "2024"
description = "Developer workspace database and knowledge-base manager"
authors = ["Your Name <you@example.com>"]

[dependencies]
clap = { version = "4", features = ["derive"] }
git2 = "0.20"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "process", "io-util", "io-std", "sync"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
walkdir = "2"
anyhow = "1"
serde_json = "1"
reqwest = { version = "0.12", features = ["json"] }
dirs = "6"
chrono = { version = "0.4", features = ["serde"] }
rusqlite = { version = "0.34", features = ["bundled", "chrono"] }
blake3 = "1.5"
ratatui = "0.30"
crossterm = "0.28"
crossbeam-channel = "0.5"
notify = "7"
clarity-core = { path = "../../clarity/crates/clarity-core", features = ["deepseek", "dashscope"] }

[dev-dependencies]
tempfile = "3"

[workspace]
