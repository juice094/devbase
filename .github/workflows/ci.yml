name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: D:\cargo-target

jobs:
  check:
    name: Check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Disable Windows Defender real-time protection
        shell: powershell
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          Write-Host "Defender real-time monitoring disabled"
      - name: Redirect devbase data dir to D: drive
        shell: powershell
        run: |
          $localData = "$env:LOCALAPPDATA\devbase"
          $tempData = "D:\devbase-ci-data"
          if (Test-Path $localData) { Remove-Item -Recurse -Force $localData }
          New-Item -ItemType Directory -Force -Path $tempData | Out-Null
          cmd /c mklink /D "$localData" "$tempData"
          Write-Host "Linked $localData -> $tempData"
      - name: Diagnostics
        shell: powershell
        run: |
          rustc --version
          cargo --version
          Write-Host "LOCALAPPDATA: $env:LOCALAPPDATA"
          Write-Host "CARGO_TARGET_DIR: $env:CARGO_TARGET_DIR"
      - run: cargo check --all-targets

  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Disable Windows Defender real-time protection
        shell: powershell
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          Write-Host "Defender real-time monitoring disabled"
      - name: Redirect devbase data dir to D: drive
        shell: powershell
        run: |
          $localData = "$env:LOCALAPPDATA\devbase"
          $tempData = "D:\devbase-ci-data"
          if (Test-Path $localData) { Remove-Item -Recurse -Force $localData }
          New-Item -ItemType Directory -Force -Path $tempData | Out-Null
          cmd /c mklink /D "$localData" "$tempData"
          Write-Host "Linked $localData -> $tempData"
      - name: Diagnostics
        shell: powershell
        run: |
          rustc --version
          cargo --version
          Write-Host "LOCALAPPDATA: $env:LOCALAPPDATA"
          Write-Host "CARGO_TARGET_DIR: $env:CARGO_TARGET_DIR"
      - run: cargo test --lib -- --test-threads=1 --nocapture

  fmt:
    name: Rustfmt
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Disable Windows Defender real-time protection
        shell: powershell
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          Write-Host "Defender real-time monitoring disabled"
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Disable Windows Defender real-time protection
        shell: powershell
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          Write-Host "Defender real-time monitoring disabled"
      - name: Redirect devbase data dir to D: drive
        shell: powershell
        run: |
          $localData = "$env:LOCALAPPDATA\devbase"
          $tempData = "D:\devbase-ci-data"
          if (Test-Path $localData) { Remove-Item -Recurse -Force $localData }
          New-Item -ItemType Directory -Force -Path $tempData | Out-Null
          cmd /c mklink /D "$localData" "$tempData"
          Write-Host "Linked $localData -> $tempData"
      - name: Diagnostics
        shell: powershell
        run: |
          rustc --version
          cargo --version
          cargo clippy --version
      - run: cargo clippy --all-targets --verbose -- -W warnings
