name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: D:\cargo-target

jobs:
  check:
    name: Check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: check
      - name: Windows environment setup
        shell: powershell
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          $localData = "$env:LOCALAPPDATA\devbase"
          $tempData = "D:\devbase-ci-data"
          if (Test-Path $localData) { Remove-Item -Recurse -Force $localData }
          New-Item -ItemType Directory -Force -Path $tempData | Out-Null
          cmd /c mklink /D "$localData" "$tempData" | Out-Null
          Write-Host "rustc: $(rustc --version)"
          Write-Host "cargo: $(cargo --version)"
      - run: cargo check --all-targets

  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: test
      - name: Windows environment setup
        shell: powershell
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          $localData = "$env:LOCALAPPDATA\devbase"
          $tempData = "D:\devbase-ci-data"
          if (Test-Path $localData) { Remove-Item -Recurse -Force $localData }
          New-Item -ItemType Directory -Force -Path $tempData | Out-Null
          cmd /c mklink /D "$localData" "$tempData" | Out-Null
          Write-Host "rustc: $(rustc --version)"
          Write-Host "cargo: $(cargo --version)"
      - run: cargo test --all-targets -- --test-threads=1 --nocapture

  fmt:
    name: Rustfmt
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy
      - name: Windows environment setup
        shell: powershell
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          $localData = "$env:LOCALAPPDATA\devbase"
          $tempData = "D:\devbase-ci-data"
          if (Test-Path $localData) { Remove-Item -Recurse -Force $localData }
          New-Item -ItemType Directory -Force -Path $tempData | Out-Null
          cmd /c mklink /D "$localData" "$tempData" | Out-Null
          Write-Host "rustc: $(rustc --version)"
          Write-Host "cargo: $(cargo --version)"
          Write-Host "clippy: $(cargo clippy --version)"
      - run: cargo clippy --all-targets --verbose -- -W warnings

  audit:
    name: Security Audit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: audit
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - run: cargo audit
